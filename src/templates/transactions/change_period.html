{% extends 'base.html' %}

{% block extra_scripts %}
<script>
const MONTH_NAMES = ['','Январь','Февраль','Март','Апрель','Май','Июнь',
                     'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
document.querySelectorAll('.period-item').forEach(el => {
    const [year, month] = el.textContent.trim().split('_');
    el.textContent = MONTH_NAMES[parseInt(month)] + ' ' + year;
});
</script>
{% endblock %}

{% block content %}
    <div class="header">
        <div>
            <div class="header-title">Выберите период</div>
            <div class="header-sub">Доступные периоды по текущему пространству</div>
        </div>
    </div>

    <div class="card">
        {% if periods %}
            <div class="period-list">
                {% for period in periods %}
                    <a class="period-item"
                       href="{% url 'transactions:apply_period' %}?period={{ period|urlencode }}&next={{ next|urlencode }}">
                        {{ period }}
                    </a>
                {% endfor %}
            </div>
        {% else %}
            <p style="color:var(--text-secondary);font-size:14px">Периоды не найдены.</p>
        {% endif %}
    </div>
{% endblock %}
