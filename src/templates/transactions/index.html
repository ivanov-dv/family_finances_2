{% extends 'base.html' %}

{% block content %}
    <div class="card intro-card">
        <div class="header-title">Добро пожаловать!</div>
        {% if user.is_authenticated %}
            <p>Используйте меню слева, чтобы посмотреть отчёт или детализацию операций.</p>
            <div style="margin-top:20px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
                <a href="{% url 'transactions:summary' %}" class="filter-btn active-f">Открыть отчёт</a>
                <a href="{% url 'transactions:transactions' %}" class="filter-btn">Открыть детализацию</a>
            </div>
        {% else %}
            <p>Для продолжения работы необходимо авторизоваться.</p>
            <div style="margin-top:20px;display:flex;gap:8px;justify-content:center">
                <button class="filter-btn active-f" data-bs-toggle="modal" data-bs-target="#loginModal">Войти</button>
                <button class="filter-btn" data-bs-toggle="modal" data-bs-target="#registrationModal">Регистрация</button>
            </div>
        {% endif %}
    </div>
{% endblock %}
